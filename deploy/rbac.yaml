# Least-privilege identity for the log-stream sidecar.
# It may ONLY get/list/watch pods and get pods/log, cluster-wide (clients span
# many namespaces). It must NEVER exec into pods, read secrets/configmaps, or
# touch the operator kubeconfig. See docs/SIDECAR.md §7.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: log-sidecar
  namespace: odoo-herd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: log-sidecar-pod-log-reader
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: log-sidecar-pod-log-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: log-sidecar-pod-log-reader
subjects:
  - kind: ServiceAccount
    name: log-sidecar
    namespace: odoo-herd
